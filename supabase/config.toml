# Configuración de Supabase Edge Functions para FichaEleam.
#
# Las Edge Functions de Supabase (CLI v1.0+) por defecto exigen un JWT.
# Para el webhook de MercadoPago debemos desactivar ese check ya que
# MP no envía un JWT — la validación se hace mediante x-signature.
#
# Las demás funciones SÍ requieren JWT (auth del usuario) y validan el rol.

[functions.mp-webhook]
verify_jwt = false

[functions.track-landing-event]
verify_jwt = false

[functions.mp-create-subscription]
verify_jwt = true

[functions.mp-cancel-subscription]
verify_jwt = true

[functions.create-demo-user]
verify_jwt = true

[functions.create-staff-user]
verify_jwt = true

[functions.delete-staff-user]
verify_jwt = true
